name: Test & Build

# Executar em: push para main/develop, pull requests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Backend: Testes, Build
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend - Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bot_financa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm install --frozen-lockfile

      - name: Lint
        run: npm run lint:backend || true

      - name: Build
        run: npm run build
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: bot_financa_test
          JWT_SECRET: test-secret
          NODE_ENV: test

      - name: Run tests
        run: npm run test || true
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: bot_financa_test
          JWT_SECRET: test-secret
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend: Testes, Build
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: npm

      - name: Install root dependencies
        run: npm install --frozen-lockfile

      - name: Install frontend dependencies
        run: cd apps/web && npm install --frozen-lockfile

      - name: Lint
        run: npm run lint:web || true
        working-directory: ./apps/web

      - name: Build
        run: npm run build
        working-directory: ./apps/web

      - name: Run tests
        run: npm run test || true
        working-directory: ./apps/web

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/web/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────────────
  # Docker: Build e Push (apenas em main)
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker - Build & Push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/botfinanca:latest
            ${{ secrets.DOCKER_USERNAME }}/botfinanca:${{ github.sha }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/botfinanca-web:latest
            ${{ secrets.DOCKER_USERNAME }}/botfinanca-web:${{ github.sha }}
        if: secrets.DOCKER_USERNAME != ''

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy: Para staging em main
  # ───────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend, docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/botfinanca-staging
            git pull origin main
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T backend npm run migrate || true
        if: secrets.STAGING_HOST != ''
